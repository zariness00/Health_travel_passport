services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: backend_user
      POSTGRES_PASSWORD: change-me-securely
      POSTGRES_DB: medical_docs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d

volumes:
  postgres_data:
